services:
  postgres:
    image: postgres:17-alpine
    container_name: duals-postgres
    environment:
      POSTGRES_DB: duals
      POSTGRES_USER: duals
      POSTGRES_PASSWORD: duals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duals -d duals"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: duals-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../..
      dockerfile: src/GestioPractiquesDuals.Api/Dockerfile
    container_name: duals-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=duals;Username=duals;Password=duals
      ConnectionStrings__Redis: redis:6379
      School__EmailDomain: ${SCHOOL_EMAIL_DOMAIN:-sarria.salesians.cat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: src/GestioPractiquesDuals.Web/Dockerfile
    container_name: duals-web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: http://api:8080/
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=duals;Username=duals;Password=duals
      ConnectionStrings__Redis: redis:6379
      DataProtection__KeysPath: /keys
      School__EmailDomain: ${SCHOOL_EMAIL_DOMAIN:-sarria.salesians.cat}
      BootstrapAdmin__Email: ${BOOTSTRAP_ADMIN_EMAIL:-admin.duals@sarria.salesians.cat}
      BootstrapAdmin__DisplayName: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-Administrador Duals}
      BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD:-Duals.Admin.2026!}
    volumes:
      - data_protection_keys:/keys
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:1.29-alpine
    container_name: duals-nginx
    ports:
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  data_protection_keys:
